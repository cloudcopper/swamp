# file:swamp_repos.yml

#
#
#
defaults:
  name:      ${REPO_NAME}
  input:     "{{with .SWAMP_INPUT}}{{.}}{{else}}/mnt/input{{end}}/${REPO_NAME}"
  meta:      "{{with .SWAMP_META}}{{.}}{{else}}export.txt{{end}}"
  storage:   "{{with .SWAMP_STORAGE}}{{.}}{{else}}/mnt/artifacts{{end}}/${REPO_NAME}"
  retention: "{{with .SWAMP_RETENTION}}{{.}}{{else}}1h{{end}}"
  broken:    "{{with .SWAMP_BROKEN}}{{.}}{{else}}/dev/null{{end}}"

pimpim:
  name:    "My Magic PimPim"
  input:   {{with .HOME}}{{.}}{{end}}/tmp/pimpim/input
  storage: {{with .HOME}}{{.}}{{end}}/tmp/pimpim/storage
