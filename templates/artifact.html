{{if .Errors}}
    {{range .Errors}}
        <p>error:{{.}}</p>
    {{end}}
{{end}}
{{with .Artifact}}
    <h1><a href="/repo/{{.RepoID}}">{{.RepoID}}</a>/{{.ID}}</h1>
    <p>CreatedAt:<span>{{.CreatedAt}}</span></p>
    <p>Size:<span>{{.Size}}</span></p>
    <p>State:<span>{{.State}}</spam></p>
    <p><a href="/download/repo/{{.RepoID}}/artifact/{{.ID}}.zip">Download</a></p>

    <h2>Files</h2>

    <h2>Meta</h2>
{{end}}
